version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: helix_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: helix_user
      POSTGRES_PASSWORD: helix_password
      POSTGRES_DB: helix_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: helix_redis_prod
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata_prod:/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: helix_backend_prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Solo persistimos la carpeta de subidas de imágenes
      - ./backend/uploads:/app/uploads
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://helix_user:helix_password@db:5432/helix_db
      REDIS_URL: redis://redis:6379/0

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: helix_frontend_prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # ATENCIÓN: Si accedes al sistema desde otra computadora, cambia "localhost" por la IP local del servidor (ej. http://192.168.1.50:8000)
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  pgdata_prod:
  redisdata_prod:
