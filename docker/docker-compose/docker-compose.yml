services:
  backend:
    build:
      context: ../backend
    container_name: nexusops-backend
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-development}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3030,http://localhost:8081}
      - STACKS_DIR=${STACKS_DIR:-/app/stacks}
    ports:
      - "${BACKEND_PORT:-8080}:8000"
    volumes:
      - ../backend:/app
      - nexusops-stacks:/app/stacks
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - nexusops-net

  frontend:
    build:
      context: ../frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
    container_name: nexusops-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
    ports:
      - "${FRONTEND_PORT:-3030}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nexusops-net

  nginx:
    image: nginx:alpine
    container_name: nexusops-proxy
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8081}:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nexusops-net

networks:
  nexusops-net:
    driver: bridge

volumes:
  nexusops-stacks:
    driver: local
