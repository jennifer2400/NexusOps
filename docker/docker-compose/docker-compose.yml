services:
  backend:
    build: ../backend
    container_name: nexusops-backend
    restart: unless-stopped
    ports:
      - "8080:8000"
    volumes:
      - ../backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nexusops-net

  frontend:
    build: 
      context: ../frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    container_name: nexusops-frontend
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    networks:
      - nexusops-net

  nginx:
    image: nginx:alpine
    container_name: nexusops-proxy
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - nexusops-net

networks:
  nexusops-net:
    driver: bridge